services:
  - type: web
    name: nanobot-gateway
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python /app/gateway_with_http.py
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: CEREBRAS_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
    autoDeploy: true

